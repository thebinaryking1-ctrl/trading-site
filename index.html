<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Billing System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none; }
            .print-only { display: block !important; }
        }
    </style>
</head>
<body class="bg-gray-100 p-5">

    <div class="max-w-4xl mx-auto bg-white p-8 shadow-lg rounded-lg">
        <div class="text-center mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold uppercase">Medical Billing System</h1>
            <p class="text-gray-600">Quick Invoice Generator</p>
        </div>

        <div class="no-print mb-8 grid grid-cols-1 md:grid-cols-4 gap-4 bg-gray-50 p-4 rounded border">
            <input id="medName" type="text" placeholder="Medicine Name" class="p-2 border rounded">
            <input id="qty" type="number" placeholder="Qty" class="p-2 border rounded">
            <input id="price" type="number" placeholder="Price per unit" class="p-2 border rounded">
            <button onclick="addItem()" class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700 font-bold">Add Item</button>
        </div>

        <table class="w-full text-left border-collapse mb-8">
            <thead>
                <tr class="bg-gray-200">
                    <th class="border p-2">Item</th>
                    <th class="border p-2">Qty</th>
                    <th class="border p-2">Price</th>
                    <th class="border p-2">Total</th>
                    <th class="border p-2 no-print">Action</th>
                </tr>
            </thead>
            <tbody id="billBody">
                </tbody>
        </table>

        <div class="text-right">
            <h2 class="text-2xl font-bold">Grand Total: ₹ <span id="grandTotal">0</span></h2>
        </div>

        <div class="mt-8 flex gap-4 no-print">
            <button onclick="window.print()" class="bg-green-600 text-white px-6 py-2 rounded font-bold">Print Bill</button>
            <button onclick="resetBill()" class="bg-red-500 text-white px-6 py-2 rounded font-bold">Clear All</button>
        </div>
    </div>

    <script>
        let totalAmount = 0;

        function addItem() {
            const name = document.getElementById('medName').value;
            const qty = document.getElementById('qty').value;
            const price = document.getElementById('price').value;

            if (name && qty && price) {
                const itemTotal = qty * price;
                totalAmount += itemTotal;

                const table = document.getElementById('billBody');
                const row = `<tr>
                    <td class="border p-2">${name}</td>
                    <td class="border p-2">${qty}</td>
                    <td class="border p-2">${price}</td>
                    <td class="border p-2">${itemTotal.toFixed(2)}</td>
                    <td class="border p-2 no-print text-center">
                        <button onclick="this.parentElement.parentElement.remove(); updateTotal(-${itemTotal})" class="text-red-500 font-bold">X</button>
                    </td>
                </tr>`;
                
                table.innerHTML += row;
                document.getElementById('grandTotal').innerText = totalAmount.toFixed(2);
                
                // Reset inputs
                document.getElementById('medName').value = '';
                document.getElementById('qty').value = '';
                document.getElementById('price').value = '';
            } else {
                alert("Please fill all fields");
            }
        }

        function updateTotal(amount) {
            totalAmount += amount;
            document.getElementById('grandTotal').innerText = totalAmount.toFixed(2);
        }

        function resetBill() {
            document.getElementById('billBody').innerHTML = '';
            totalAmount = 0;
            document.getElementById('grandTotal').innerText = '0';
        }
    </script>
</body>
</html>
